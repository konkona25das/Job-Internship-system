{% extends "base.html" %} {% block title %}Sign Up{% endblock %} {% block
content %}
<form method="POST">
  <h3 align="center">Sign Up</h3>
  <div class="form-group">
    <label for="name">Name</label>
    <input
      type="text"
      class="form-control"
      id="name"
      name="name"
      placeholder="Enter name"
    />
  </div>
  <div class="form-group">
    <label for="email">Email Address</label>
    <input
      type="email"
      class="form-control"
      id="email"
      name="email"
      placeholder="Enter email"
    />
    <div class="form-group">
      <label for="username">Username</label>
      <input
        type="type"
        class="form-control"
        id="username"
        name="username"
        placeholder="Enter username"
      />
  </div>
  <div class="form-group">
    <label for="password1">Password</label>
    <input
      type="password"
      class="form-control"
      id="password1"
      name="password1"
      placeholder="Enter password"
    />
  </div>
  <div class="form-group">
    <label for="password2">Password (Confirm)</label>
    <input
      type="password"
      class="form-control"
      id="password2"
      name="password2"
      placeholder="Confirm password"
    />
  </div>
    <div class="form-group mt-3">
      <label for="role">I am signing up as: (seeker/employer)</label>
      <div>
          <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="role" id="seeker" value="seeker" checked>
              <label class="form-check-label" for="seeker">Job Seeker</label>
          </div>
          <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="role" id="employer" value="employer">
              <label class="form-check-label" for="employer">Employer/Recruiter</label>
          </div>
      </div>
    </div>
  <br />
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
{% endblock %}
